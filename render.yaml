services:
  - type: web
    name: ads-monitor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ads-monitor-db
          property: connectionString

databases:
  - name: ads-monitor-db
    plan: free
